<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Demo</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow" style="width: 22rem;">
    <div class="card-body" id="auth-container">
      <h5 class="card-title text-center mb-3" id="form-title">Register</h5>
      <form id="auth-form">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100" id="submit-btn">Register</button>
      </form>
      <hr />
      <p class="text-center">
        <span id="toggle-message">Already have an account?</span>
        <a href="#" id="toggle-link">Login</a>
      </p>
    </div>

    <div class="card-body d-none" id="profile-container">
      <h5 class="card-title text-center mb-3">Profile</h5>
      <p class="text-center" id="profile-info"></p>
      <button class="btn btn-outline-secondary w-100" id="logout-btn">Logout</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
